<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超信 CH-US（最初版）</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#EDEDED;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
.topbar{background:#147DF0;color:white;padding:12px 16px;text-align:center}
.chat{padding:10px;height:calc(100vh - 120px);overflow-y:auto}
.msg{display:flex;margin:8px 0}
.msg.me{justify-content:flex-end}
.msg .bubble{max-width:70%;padding:10px 14px;border-radius:18px}
.msg.other .bubble{background:white}
.msg.me .bubble{background:#9EEA6A}
.inputbar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;padding:8px}
.inputbar input{flex:1;padding:12px;border-radius:20px;border:1px solid #ddd}
.inputbar button{padding:12px 18px;background:#147DF0;color:white;border:0;border-radius:20px;margin-left:8px}
</style>
</head>
<body>
<div class="topbar">超信 CH-US（最初版）</div>
<div class="chat" id="chat"></div>
<div class="inputbar">
<input id="input" placeholder="输入消息...">
<button onclick="send()">发送</button>
</div>

<script>
const ctx = new AudioContext();
const BASE = 18500;

function encode(s) {
  return Array.from(s).map(c => c.charCodeAt(0) + BASE);
}

async function play(freqs) {
  for (const f of freqs) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = f;
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    g.gain.value = 0.7;
    await new Promise(r => setTimeout(r, 90));
    o.stop();
    await new Promise(r => setTimeout(r, 20));
  }
}

async function startListen() {
  const mic = await navigator.mediaDevices.getUserMedia({audio:true});
  const anal = ctx.createAnalyser();
  ctx.createMediaStreamSource(mic).connect(anal);
  const data = new Uint8Array(anal.frequencyBinCount);
  let buf = [];

  setInterval(() => {
    anal.getByteFrequencyData(data);
    let max = 0, idx = 0;
    for (let i=0;i<data.length;i++) if (data[i]>max) { max=data[i]; idx=i; }
    const freq = (idx * ctx.sampleRate)/(2*data.length);
    if (max>100 && freq >= BASE && freq <= BASE+2000) {
      buf.push(Math.round(freq-BASE));
      if (buf.length>10) buf=buf.slice(-10);
      try {
        const str = String.fromCharCode(...buf.slice(-4));
        if (str.trim()) { addMsg(str,false); buf=[]; }
      } catch {}
    }
  }, 60);
}

function addMsg(text,isMe) {
  const c = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe?'me':'other');
  div.innerHTML = `<div class="bubble">${text}</div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

async function send() {
  const t = document.getElementById('input').value.trim();
  if(!t) return;
  addMsg(t,true);
  document.getElementById('input').value='';
  await play(encode(t));
}

startListen();
</script>
</body>
</html>

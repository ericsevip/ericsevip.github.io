<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超信 CH-US · 超声波微信</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EDEDED;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif}
.topbar{background:#147DF0;color:#fff;padding:14px;text-align:center;font-size:18px}
.chat-area{padding:12px;height:calc(100vh - 124px);overflow-y:auto}
.msg{display:flex;margin:8px 0}
.msg.me{justify-content:flex-end}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4}
.msg.other .bubble{background:#fff;border-bottom-left-radius:4px}
.msg.me .bubble{background:#9EEA6A;border-bottom-right-radius:4px}
.input-box{position:fixed;bottom:0;left:0;right:0;background:#fff;display0;background:#fff;display:flex;padding:10px;gap:8px;border-top:1px solid #ddd}
.input-box input{flex:1;padding:12px 16px;border-radius:20px;border:1px solid #ddd;font-size:15px}
.input-box button{padding:12px 20px;background:#147DF0;color:#fff;border:none;border-radius:20px}
</style>
</head>
<body>
<div class="topbar">超信 CH-US（超声波聊天）</div>
<div class="chat-area" id="chat"></div>
<div class="input-box">
<input id="input" placeholder="说点什么..." autocomplete="off">
<button onclick="send()">发送</button>
</div>

<script>
const role = Math.random() > 0.5 ? 'A' : 'B';
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const BASE_FREQ = 18500;
let receiveBuffer = [];

// 文字 → 超声波频率
function encode(text) {
  return Array.from(text).map(c => c.charCodeAt(0) + BASE_FREQ);
}

// 播放超声波
async function play(freqs) {
  for (const f of freqs) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    g.gain.value = 0.7;
    await new Promise(r => setTimeout(r, 90));
    o.stop();
    await new Promise(r => setTimeout(r, 25));
  }
}

// 监听麦克风
async function startListening() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  setInterval(() => {
    analyser.getByteFrequencyData(data);
    let max = 0, idx = 0;
    for (let i = 0; i < data.length; i++) {
      if (data[i] > max) { max = data[i]; idx = i; }
    }
    const freq = (idx * audioCtx.sampleRate) / (2 * data.length);
    if (max > 100 && freq >= BASE_FREQ && freq <= BASE_FREQ + 2000) {
      receiveBuffer.push(Math.round(freq - BASE_FREQ));
      if (receiveBuffer.length > 12) receiveBuffer = receiveBuffer.slice(-12);
      tryParse();
    }
  }, 60);
}

// 解析文字
function tryParse() {
  try {
    const str = String.fromCharCode(...receiveBuffer.slice(-5));
    if (str.trim().length > 0) {
      addMsg(str, false);
      receiveBuffer = [];
    }
  } catch (e) {}
}

// 界面消息
function addMsg(text, isMe) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.innerHTML = `<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 发送
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, true);
  input.value = '';
  await play(encode(text));
}

startListening();
</script>
</body>
</html>

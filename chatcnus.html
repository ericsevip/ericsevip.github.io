<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超信 CH-US（极简稳定版）</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#EDEDED;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
.topbar{background:#147DF0;color:white;padding:12px 16px;text-align:center}
.chat{padding:10px;height:calc(100vh - 120px);overflow-y:auto}
.msg{display:flex;margin:8px 0}
.msg.me{justify-content:flex-end}
.bubble{max-width:70%;padding:10px 14px;border-radius:18px}
.msg.other .bubble{background:white}
.msg.me .bubble{background:#9EEA6A}
.inputbar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;padding:8px}
input{flex:1;padding:12px;border-radius:20px;border:1px solid #ddd}
button{padding:12px 18px;background:#147DF0;color:white;border:0;border-radius:20px;margin-left:8px}
</style>
</head>
<body>
<div class="topbar">超信 CH-US（极简稳定）</div>
<div class="chat" id="chat"></div>
<div class="inputbar">
<input id="input" placeholder="输入消息...">
<button onclick="send()">发送</button>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const BASE = 18500;

// 极简发送（你喜欢的刺耳声音）
async function send() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;
  addMsg(text, true);
  document.getElementById("input").value = "";

  // 发送同步头 + 文字
  for (let i = 0; i < text.length; i++) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = BASE + text.charCodeAt(i);
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    g.gain.value = 0.7;
    await delay(120);
    o.stop();
    await delay(40);
  }
}

// 极简监听（必收到）
async function startListen() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const anal = ctx.createAnalyser();
  anal.fftSize = 4096;
  ctx.createMediaStreamSource(stream).connect(anal);
  const data = new Uint8Array(anal.frequencyBinCount);
  let buffer = [];

  setInterval(() => {
    anal.getByteFrequencyData(data);
    let max = 0, idx = 0;
    for (let i = 0; i < data.length; i++) {
      if (data[i] > max) { max = data[i]; idx = i; }
    }
    const freq = (idx * ctx.sampleRate) / (2 * data.length);
    if (max > 100 && freq >= BASE && freq <= BASE + 2000) {
      buffer.push(Math.round(freq - BASE));
      if (buffer.length > 6) {
        try {
          const str = String.fromCharCode(...buffer);
          addMsg(str, false);
          buffer = [];
        } catch {}
      }
    }
  }, 60);
}

function addMsg(text, me) {
  const div = document.createElement("div");
  div.className = "msg " + (me ? "me" : "other");
  div.innerHTML = `<div class="bubble">${text}</div>`;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 99999;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

startListen();
</script>
</body>
</html>
